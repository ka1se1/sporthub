                                            .map((m, i) => {
                                                const isJapanMatch = m.away === "Japan" || m.home === "Japan";
                                                const isPast = new Date(m.date) < now;
                                                return (
                                                    <div key={i} style={{ padding: "8px 0", borderBottom: i < g.matches.length - 1 ? "1px solid #1a1a1a" : "none", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, opacity: isPast ? 0.45 : 1 }}>
                                                        <div style={{ minWidth: 0, flex: 1 }}>
                                                            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: isJapanMatch ? "#E5253E" : "#666", letterSpacing: 0.5, marginBottom: 3 }}>
                                                                {fmtDate(m.date)}{isPast ? " · 終了" : ""}
                                                            </div>
                                                            <div style={{ fontSize: 12, color: "#ddd", fontFamily: "'Manrope', sans-serif", fontWeight: isJapanMatch ? 700 : 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                                                {m.away === "Japan" ? "🇯🇵 " : ""}{m.away}
                                                                <span style={{ color: "#555", margin: "0 6px" }}>vs</span>
                                                                {m.home === "Japan" ? "🇯🇵 " : ""}{m.home}
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        function NpbFallback({ league, view }) {
            const links = [
                { name: "NPB公式", url: "https://npb.jp/", desc: "公式試合結果・日程" },
                { name: "スポーツナビ", url: "https://baseball.yahoo.co.jp/npb/", desc: "速報・成績・選手情報" },
                { name: "Yahoo!スポーツ", url: "https://sports.yahoo.co.jp/baseball/", desc: "リアルタイムスコア" },
            ];
            const viewLabel = { scores: "試合結果・速報", schedule: "試合日程", leaders: "個人成績・タイトル" }[view] || "情報";
            return (
                <div>
                    <div style={{ background: "#141414", border: "1px solid #1f1f1f", borderLeft: `3px solid ${league.accent}`, padding: 20, marginBottom: 12 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                            <div style={{ width: 36, height: 36, borderRadius: 4, background: "rgba(229,37,62,0.15)", border: `1px solid ${league.accent}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>⚾</div>
                            <div>
                                <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 18, color: "#fff", letterSpacing: 1, lineHeight: 1.1 }}>NPB {viewLabel.toUpperCase()}</div>
                                <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#666", letterSpacing: 1, marginTop: 4 }}>EXTERNAL SOURCES</div>
                            </div>
                        </div>
                        <div style={{ fontSize: 12, color: "#aaa", lineHeight: 1.6, marginBottom: 4 }}>
                            日本プロ野球の{viewLabel}は無料公開APIが提供されていないため、
                            このアプリ内では表示できません。下記の信頼できる外部ソースから確認できます。
                        </div>
                        <div style={{ fontSize: 11, color: "#666", lineHeight: 1.5 }}>
                            ※ 順位表のみ <span style={{ color: league.accent, fontFamily: "'JetBrains Mono', monospace" }}>npb-result API</span> 経由で対応
                        </div>
                    </div>

                    {links.map((link, i) => (
                        <a key={i} href={link.url} target="_blank" rel="noopener noreferrer" className="clickable" style={{ display: "block", background: "#141414", border: "1px solid #1f1f1f", padding: "14px 16px", marginBottom: 6, textDecoration: "none", color: "inherit" }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                                <div style={{ minWidth: 0 }}>
                                    <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 16, color: "#fff", letterSpacing: 1, marginBottom: 2 }}>{link.name}</div>
                                    <div style={{ fontSize: 11, color: "#888" }}>{link.desc}</div>
                                </div>
                                <div style={{ color: league.accent, flexShrink: 0 }}>
                                    <I.Ext size={16} />
                                </div>
                            </div>
                        </a>
                    ))}

                    <div style={{ marginTop: 16, padding: 14, background: "rgba(229,37,62,0.05)", border: "1px dashed rgba(229,37,62,0.3)" }}>
                        <div style={{ fontSize: 10, color: league.accent, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 1, marginBottom: 8, fontWeight: 700 }}>
                            日本での主な配信
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {(league.broadcasts || []).map((b, i) => <BroadcastBadge key={i} broadcast={b} />)}
                        </div>
                    </div>
                </div>
            );
        }

        function FallbackPanel({ league }) {
            return (
                <div style={{ background: "#141414", border: "1px solid #1f1f1f", borderLeft: `3px solid ${league.accent}`, padding: 20 }}>
                    <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 18, color: "#fff", letterSpacing: 1, marginBottom: 8 }}>データ未対応</div>
                    <div style={{ fontSize: 13, color: "#aaa", lineHeight: 1.6, marginBottom: 16 }}>{league.short} は無料の公開APIで対応してないため、ライブデータを表示できません。</div>
                    {league.fallbackUrl && <a href={league.fallbackUrl} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "8px 12px", background: "rgba(255,255,255,0.05)", border: "1px solid #333", color: "#eee", textDecoration: "none", fontSize: 11, fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5 }}>公式サイトを開く <I.Ext size={10} /></a>}
                </div>
            );
        }

        // -----------------------------
        // Main App
        // -----------------------------
        function SportsHub() {
            const [leagueId, setLeagueId] = useState("mlb");
            const [soccerSubId, setSoccerSubId] = useState("epl");
            const [intlSubId, setIntlSubId] = useState("wc");
            const [view, setView] = useState("scores");
            const [scoreDateOffset, setScoreDateOffset] = useState(0);
            const [data, setData] = useState({});
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [selectedGame, setSelectedGame] = useState(null);
            // New: favorites, search, JP filter
            const [storage, setStorage] = useState(() => loadStorage());
            const [searchOpen, setSearchOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState("");
            const [jpFilter, setJpFilter] = useState(storage.jpFilter);

            // Persist storage on change
            useEffect(() => { saveStorage({ ...storage, jpFilter }); }, [storage, jpFilter]);

            const toggleFavTeam = useCallback((teamName) => {
                setStorage((s) => {
                    const exists = s.favTeams.includes(teamName);
                    return { ...s, favTeams: exists ? s.favTeams.filter((t) => t !== teamName) : [...s.favTeams, teamName] };
                });
            }, []);
            const isFavTeam = useCallback((teamName) => storage.favTeams.includes(teamName), [storage.favTeams]);

            const league = LEAGUES.find((l) => l.id === leagueId);
            const isCategory = league.isCategory;
            const subId = leagueId === "intl_soccer" ? soccerSubId : leagueId === "intl_cup" ? intlSubId : null;
            const setSubId = leagueId === "intl_soccer" ? setSoccerSubId : leagueId === "intl_cup" ? setIntlSubId : () => {};

            const subLeague = isCategory && league.subLeagues ? league.subLeagues.find((s) => s.id === subId) : null;

            const effective = useMemo(() => {
                return subLeague ? {
                    name: subLeague.name, espn: subLeague.espn, isMlbOfficial: subLeague.isMlbOfficial, isNpb: subLeague.isNpb, apiFootballId: subLeague.apiFootballId, broadcasts: subLeague.broadcasts, sport: subLeague.sport || league.sport, short: subLeague.short, fallbackUrl: subLeague.fallbackUrl,
                    featuredMatches: subLeague.featuredMatches, tournamentStart: subLeague.tournamentStart, tournamentEnd: subLeague.tournamentEnd,
                } : {
                    name: league.name, espn: league.espn, isMlbOfficial: league.isMlbOfficial, isNpb: league.isNpb, apiFootballId: league.apiFootballId, broadcasts: league.broadcasts, sport: league.sport, short: league.short, fallbackUrl: league.fallbackUrl,
                };
            }, [league, subLeague]);

            const offsetSuffix = view === "scores" ? `:${scoreDateOffset}` : "";
            const cacheKey = isCategory ? `${leagueId}:${subId}:${view}${offsetSuffix}` : `${leagueId}:${view}${offsetSuffix}`;
            const current = data[cacheKey];
            const currentDataRef = useRef(data);
            useEffect(() => { currentDataRef.current = data; }, [data]);

            const effEspn = effective.espn;
            const effMlb = effective.isMlbOfficial;
            const effNpb = effective.isNpb;
            const effApiFb = effective.apiFootballId;
            const effSport = effective.sport;
            const effBroadcasts = effective.broadcasts;

            const load = useCallback(async (force = false) => {
                // Always clear stale error/loading on navigation, even if cache hits
                setError(null);
                if (!force && currentDataRef.current[cacheKey]) return;
                if (!effEspn && !effNpb) { return; }
                
                setLoading(true);
                setError(null);

                try {
                    let result;
                    if (effNpb) {
                        if (view === "standings") {
                            const [clRes, plRes] = await Promise.all([
                                fetch("https://npb-result.ant-npb.workers.dev/api/cl"),
                                fetch("https://npb-result.ant-npb.workers.dev/api/pl")
                            ]);
                            if (!clRes.ok || !plRes.ok) throw new Error("NPB APIエラー");
                            const clData = await clRes.json();
                            const plData = await plRes.json();
                            
                            result = {
                                groups: [
                                    { name: "セ・リーグ", teams: clData.map(t => ({ rank: t.rank, team: t.name, logo: null, wins: t.win, losses: t.lose, gamesBack: String(t.gamesBehind) })) },
                                    { name: "パ・リーグ", teams: plData.map(t => ({ rank: t.rank, team: t.name, logo: null, wins: t.win, losses: t.lose, gamesBack: String(t.gamesBehind) })) }
                                ]
                            };
                        } else {
                            // NPB has no public API for scores/leaders/schedule
                            // Set fallback flag instead of throwing error
                            result = { npbFallback: true, view };
                        }
                    } else if (effEspn) {
                        if (view === "standings") {
                            const raw = await fetchStandings(effEspn);
                            result = { groups: parseStandings(raw, effSport) };
                        } else if (view === "leaders") {
                            const raw = await fetchLeaders(effEspn);
                            result = { categories: parseLeaders(raw, effSport) };
                        } else {
                            // scores or schedule
                            const raw = await fetchScoreboard(effEspn, view, scoreDateOffset);
                            const events = (raw.events || []).map((e) => parseGame(e, effSport, effBroadcasts)).filter(Boolean);
                            if (view === "scores") result = { games: events };
                            else result = { upcoming: events };
                        }
                    }
                    setData((prev) => ({ ...prev, [cacheKey]: result }));
                } catch (e) {
                    console.error(e);
                    setError(e.message || "Failed to load");
                } finally {
                    setLoading(false);
                }
            }, [cacheKey, effEspn, effMlb, effNpb, effApiFb, effSport, effBroadcasts, view, scoreDateOffset]);

            useEffect(() => { load(); }, [load]);

            // 30秒ごとのリアルタイム更新機能
            useEffect(() => {
                if (!effEspn && !effNpb) return;
                if (selectedGame || view !== "scores") return;

                const intervalId = setInterval(() => {
                    load(true);
                }, 30000);

                return () => clearInterval(intervalId);
            }, [load, effEspn, effNpb, selectedGame, view]);

            const noData = !effEspn && !effNpb;

            return (
                <div className="app-shell fade-in">
                    <div className="safe-header" style={{ position: "sticky", top: 0, zIndex: 10, background: "rgba(10,10,10,0.85)", backdropFilter: "blur(12px)", WebkitBackdropFilter: "blur(12px)", borderBottom: "1px solid #1a1a1a" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 16px 12px" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <div style={{ width: 24, height: 24, borderRadius: 4, background: league.accent, display: "flex", alignItems: "center", justifyContent: "center", color: "#0a0a0a" }}>
                                    {league.sport === "soccer" ? <I.Ball size={14} /> : <I.Activity size={14} />}
                                </div>
                                <h1 style={{ margin: 0, fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 900, fontSize: 24, letterSpacing: 1, color: "#fff", lineHeight: 1 }}>SCORE<span style={{ color: league.accent }}>HUB</span></h1>
                            </div>
                            <div style={{ display: "flex", gap: 6 }}>
                                <button
                                    onClick={() => setJpFilter((v) => !v)}
                                    style={{ background: jpFilter ? "#E5253E" : "transparent", border: `1px solid ${jpFilter ? "#E5253E" : "#2a2a2a"}`, color: jpFilter ? "#fff" : "#999", padding: "6px 8px", display: "flex", alignItems: "center", gap: 4, fontFamily: "'JetBrains Mono', monospace", fontSize: 10, fontWeight: 700, letterSpacing: 0.5 }}
                                    aria-label="Filter Japanese players"
                                    title="日本人選手・日本代表のみ表示"
                                >
                                    🇯🇵 JP
                                </button>
                                <button
                                    onClick={() => { setSearchOpen((v) => !v); if (searchOpen) setSearchQuery(""); }}
                                    style={{ background: searchOpen ? league.accent : "transparent", border: `1px solid ${searchOpen ? league.accent : "#2a2a2a"}`, color: searchOpen ? "#0a0a0a" : "#999", padding: 8, display: "flex", alignItems: "center" }}
                                    aria-label="Search"
                                >
                                    <I.Search size={14} />
                                </button>
                                <button onClick={() => load(true)} disabled={loading || noData} style={{ background: "transparent", border: "1px solid #2a2a2a", color: noData ? "#444" : "#999", padding: 8, borderRadius: 0, display: "flex", alignItems: "center" }} aria-label="Refresh">
                                    <I.Refresh size={14} style={loading ? { animation: "spin 1s linear infinite" } : {}} />
                                </button>
                            </div>
                        </div>
                        {searchOpen && (
                            <div style={{ padding: "0 16px 12px" }}>
                                <input
                                    type="text"
                                    autoFocus
                                    placeholder="チーム名で検索..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    style={{ width: "100%", background: "#0a0a0a", border: "1px solid #2a2a2a", color: "#eee", padding: "8px 12px", fontFamily: "'Manrope', sans-serif", fontSize: 13, outline: "none" }}
                                />
                            </div>
                        )}
                        <div className="scrollx" style={{ display: "flex", overflowX: "auto", marginLeft: -16, marginRight: -16, paddingLeft: 16, paddingRight: 16 }}>
                            {LEAGUES.map((l) => {
                                const active = l.id === leagueId;
                                return (
                                    <button key={l.id} onClick={() => setLeagueId(l.id)} style={{ background: "none", border: "none", padding: "10px 14px 12px", borderBottom: active ? `2px solid ${l.accent}` : "2px solid transparent", color: active ? "#fff" : "#666", flexShrink: 0, fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: active ? 800 : 600, fontSize: 16, letterSpacing: 1, transition: "color 0.2s", whiteSpace: "nowrap" }}>
                                        {l.short}<span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: "#555", marginLeft: 6, letterSpacing: 0.5 }}>{l.region}</span>
                                    </button>
                                );
                            })}
                        </div>
                    </div>

                    {isCategory && league.subLeagues && (
                        <div style={{ borderBottom: "1px solid #1a1a1a", background: "#0d0d0d" }}>
                            <div className="scrollx" style={{ display: "flex", gap: 4, padding: "8px 16px", overflowX: "auto" }}>
                                {league.subLeagues.map((sl) => {
                                    const active = sl.id === subId;
                                    return (
                                        <button key={sl.id} onClick={() => setSubId(sl.id)} style={{ background: active ? league.accent : "transparent", color: active ? "#0a0a0a" : "#888", border: `1px solid ${active ? league.accent : "#222"}`, padding: "5px 10px", fontSize: 10, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, letterSpacing: 0.5, whiteSpace: "nowrap", transition: "all 0.2s" }}>
                                            {sl.short}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", borderBottom: "1px solid #1a1a1a", background: "#0d0d0d" }}>
                        {VIEWS.map((v) => {
                            const active = view === v.id;
                            const Icon = v.icon;
                            return (
                                <button key={v.id} onClick={() => setView(v.id)} style={{ background: active ? "rgba(255,255,255,0.03)" : "none", border: "none", padding: "12px 0", color: active ? "#fff" : "#666", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, transition: "all 0.2s" }}>
                                    <Icon size={16} style={{ color: active ? league.accent : "inherit" }} />
                                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: active ? 700 : 400, letterSpacing: 1 }}>{v.label.toUpperCase()}</span>
                                </button>
                            );
                        })}
                    </div>

                    <div style={{ padding: "16px 16px 8px", display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 4, height: 4, borderRadius: "50%", background: league.accent }} />
                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#888", letterSpacing: 1 }}>{effective.name.toUpperCase()}</span>
                    </div>

                    <div className="grain" style={{ padding: 16, minHeight: 400 }}>
                        {noData && <FallbackPanel league={effective} />}

                        {!noData && loading && !current && (
                            <LoadingSkeleton view={view} accent={league.accent} />
                        )}

                        {!noData && error && (
                            <div style={{ background: "#1a0f0f", border: "1px solid #3a1f1f", padding: 16, display: "flex", gap: 10, alignItems: "flex-start" }}>
                                <I.Alert size={16} color="#ff4444" style={{ flexShrink: 0 }} />
                                <div style={{ fontSize: 13, color: "#ff8888", lineHeight: 1.5 }}>{error}</div>
                            </div>
                        )}

                        {!noData && current && !error && (
                            <div className="fade-in">
                                {current.npbFallback && <NpbFallback league={league} view={view} />}
                                {!current.npbFallback && view === "scores" && (
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, background: "#111", padding: "8px 12px", borderRadius: 4, border: "1px solid #1f1f1f", gap: 8 }}>
                                        <button onClick={() => setScoreDateOffset(o => o - 1)} style={{ background: "none", border: "none", color: league.accent, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 12, padding: "4px 8px", flexShrink: 0 }}>← PREV</button>
                                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, minWidth: 0, flex: 1, position: "relative" }}>
                                            <button
                                                onClick={(e) => {
                                                    const picker = e.currentTarget.parentElement.querySelector('input[type="date"]');
                                                    if (!picker) return;
                                                    if (typeof picker.showPicker === 'function') {
                                                        try { picker.showPicker(); } catch { picker.click(); }
                                                    } else { picker.click(); }
                                                }}
                                                style={{ background: "none", border: "1px dashed transparent", padding: "2px 8px", display: "flex", alignItems: "center", gap: 6, color: "#eee", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, whiteSpace: "nowrap", cursor: "pointer" }}
                                                onMouseEnter={(e) => e.currentTarget.style.borderColor = league.accent}
                                                onMouseLeave={(e) => e.currentTarget.style.borderColor = "transparent"}
                                            >
                                                📅 {(() => {
                                                    const d = new Date();
                                                    d.setDate(d.getDate() + scoreDateOffset);
                                                    const day = ["SUN","MON","TUE","WED","THU","FRI","SAT"][d.getDay()];
                                                    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${day}`;
                                                })()}
                                            </button>
                                            <input
                                                type="date"
                                                value={(() => {
                                                    const d = new Date();
                                                    d.setDate(d.getDate() + scoreDateOffset);
                                                    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
                                                })()}
                                                onChange={(e) => {
                                                    if (!e.target.value) return;
                                                    const sel = new Date(e.target.value + 'T00:00:00');
                                                    const tod = new Date();
                                                    tod.setHours(0,0,0,0);
                                                    sel.setHours(0,0,0,0);
                                                    const diff = Math.round((sel - tod) / 86400000);
                                                    setScoreDateOffset(diff);
                                                }}
                                                style={{ position: "absolute", opacity: 0, width: 1, height: 1, pointerEvents: "none" }}
                                                tabIndex={-1}
                                                aria-hidden="true"
                                            />
                                            {scoreDateOffset !== 0 && (
                                                <button onClick={() => setScoreDateOffset(0)} style={{ background: league.accent, border: "none", color: "#0a0a0a", fontFamily: "'JetBrains Mono', monospace", fontWeight: 800, fontSize: 9, letterSpacing: 1, padding: "3px 10px", borderRadius: 2, cursor: "pointer" }}>
                                                    ⊙ TODAY
                                                </button>
                                            )}
                                            {scoreDateOffset === 0 && (
                                                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 8, color: "#555", letterSpacing: 1 }}>TODAY · TAP DATE TO JUMP</span>
                                            )}
                                        </div>
                                        <button onClick={() => setScoreDateOffset(o => o + 1)} style={{ background: "none", border: "none", color: league.accent, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 12, padding: "4px 8px", flexShrink: 0 }}>NEXT →</button>
                                    </div>
                                )}
                                {/* World Cup highlights for intl_cup + wc */}
                                {effective.featuredMatches && (view === "scores" || view === "schedule") && (
                                    <WorldCupHighlights tournament={effective} accent={league.accent} />
                                )}

                                {!current.npbFallback && view === "scores" && (() => {
                                    let games = current.games || [];
                                    // JP filter
                                    if (jpFilter) {
                                        games = games.filter((g) => getJpPlayers(g.home, g.away).length > 0);
                                    }
                                    // Search filter
                                    if (searchQuery.trim()) {
                                        const q = searchQuery.toLowerCase();
                                        games = games.filter((g) => (g.home || "").toLowerCase().includes(q) || (g.away || "").toLowerCase().includes(q));
                                    }
                                    // Sort: favorites & JP games first
                                    const sorted = [...games].sort((a, b) => {
                                        const aFav = isFavTeam(a.home) || isFavTeam(a.away);
                                        const bFav = isFavTeam(b.home) || isFavTeam(b.away);
                                        if (aFav !== bFav) return aFav ? -1 : 1;
                                        const aJp = getJpPlayers(a.home, a.away).length > 0;
                                        const bJp = getJpPlayers(b.home, b.away).length > 0;
                                        if (aJp !== bJp) return aJp ? -1 : 1;
                                        return 0;
                                    });
                                    if (sorted.length === 0) return <div style={{ textAlign: "center", padding: 40, color: "#555" }}>{searchQuery || jpFilter ? "条件に合う試合が見つかりません" : "No games today."}</div>;
                                    return sorted.map((g) => (
                                        <GameCard
                                            key={g.id}
                                            game={g}
                                            accent={league.accent}
                                            sport={effective.sport}
                                            onClick={() => setSelectedGame(g)}
                                            isFav={isFavTeam}
                                            onToggleFav={toggleFavTeam}
                                            jpPlayers={getJpPlayers(g.home, g.away)}
                                        />
                                    ));
                                })()}

                                {!current.npbFallback && view === "standings" && <StandingsTable groups={current.groups} accent={league.accent} sport={effective.sport} />}

                                {!current.npbFallback && view === "schedule" && current.upcoming?.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#555" }}>No upcoming games scheduled.</div>}
                                {!current.npbFallback && view === "schedule" && <ScheduleList upcoming={current.upcoming} accent={league.accent} onSelect={(g) => setSelectedGame(g)} />}

                                {!current.npbFallback && view === "leaders" && <LeadersBoard categories={current.categories} accent={league.accent} />}
                            </div>
                        )}

                        <div style={{ marginTop: 40, padding: "20px 0", borderTop: "1px solid #1a1a1a", textAlign: "center" }}>
                            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#444", letterSpacing: 2, lineHeight: 1.8 }}>
                                DATA · ESPN PUBLIC API {effective.isMlbOfficial ? "& MLB STATS API" : ""} {effective.isNpb ? "& NPB UNOFFICIAL API" : ""}
                                <br />配信情報は概算です・試合により異なる場合あり
                            </div>
                        </div>
                    </div>

                    {selectedGame && (effective.espn || effective.isMlbOfficial) && (
                        <GameDetailModal
                            game={selectedGame}
                            league={{ ...league, accent: league.accent }}
                            sport={effective.sport}
                            espnPath={effective.espn}
                            isMlbOfficial={effective.isMlbOfficial}
                            onClose={() => setSelectedGame(null)}
                        />
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<SportsHub />);
    </script>
</body>

</html>

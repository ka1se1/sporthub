    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #eee;
            font-family: "Manrope", sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        button:focus-visible {
            outline: 2px solid currentColor;
            outline-offset: 2px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUpBig {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        .skeleton {
            background: linear-gradient(90deg, #161616 0%, #1f1f1f 50%, #161616 100%);
            background-size: 200% 100%;
            animation: shimmer 1.6s ease-in-out infinite;
            border-radius: 2px;
        }

        .skeleton-card {
            background: #141414;
            border: 1px solid #1f1f1f;
            border-left: 3px solid;
            padding: 14px 16px;
            margin-bottom: 8px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: breathe 1.4s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        .scrollx::-webkit-scrollbar {
            display: none;
        }

        .scrollx {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .fade-in {
            animation: slideUp 0.3s ease-out;
        }

        .grain {
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 3px 3px;
        }

        .app-shell {
            max-width: 480px;
            margin: 0 auto;
            background: #0a0a0a;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Sticky header with iPhone notch / status bar safe area */
        .safe-header {
            padding-top: env(safe-area-inset-top) !important;
        }

        /* Background extension behind status bar (so blur looks correct) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: env(safe-area-inset-top);
            background: #0a0a0a;
            z-index: 100;
            pointer-events: none;
        }

        @media (min-width: 600px) {
            .app-shell {
                box-shadow: 0 0 80px rgba(0, 0, 0, 0.7);
                border-left: 1px solid #161616;
                border-right: 1px solid #161616;
            }
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 50;
            animation: fadeIn 0.2s ease-out;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-sheet {
            width: 100%;
            max-width: 480px;
            max-height: 92vh;
            max-height: 92dvh;
            overflow-y: auto;
            background: #0a0a0a;
            border-top: 1px solid #1f1f1f;
            animation: slideUpBig 0.28s cubic-bezier(0.2, 0.8, 0.25, 1);
            padding-bottom: env(safe-area-inset-bottom);
        }

        @media (min-width: 600px) {
            .modal-backdrop {
                align-items: center;
            }
            .modal-sheet {
                max-height: 88vh;
                border: 1px solid #1f1f1f;
            }
        }

        .clickable {
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .clickable:active {
            transform: scale(0.99);
        }

        /* サッカーピッチ用のスタイル */
        .soccer-pitch {
            background: linear-gradient(180deg, #163e20 0%, #1a472a 100%);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            position: relative;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
            justify-content: space-around;
            min-height: 280px;
            overflow: hidden;
        }
        .pitch-lines::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            pointer-events: none;
        }
        .pitch-lines::after {
            content: "";
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            pointer-events: none;
        }
        .pitch-center-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255,255,255,0.2);
            transform: translateY(-50%);
        }
        .pitch-center-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>

        // -----------------------------

        function parseGame(event, sport, broadcasts) {
            const comp = event?.competitions?.[0];
            if (!comp) return null;
            const home = comp.competitors?.find((c) => c.homeAway === "home");
            const away = comp.competitors?.find((c) => c.homeAway === "away");
            if (!home || !away) return null;
            const stateMap = { pre: "scheduled", in: "live", post: "final" };
            const status = stateMap[event.status?.type?.state] || "scheduled";
            const date = new Date(event.date);
            const dateLabel = `${pad(date.getMonth() + 1)}/${pad(date.getDate())}`;
            const timeLabel = date.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", timeZone: "Asia/Tokyo" });
            let detail = null;
            if (status === "live") {
                if (sport === "baseball") detail = event.status?.type?.shortDetail || event.status?.type?.detail || (event.status?.period ? `${event.status.period}回` : null);
                else detail = event.status?.displayClock || (event.status?.period ? `${event.status.period}H` : null);
            }
            return {
                id: event.id,
                home: home.team?.displayName || home.team?.name || "Home",
                away: away.team?.displayName || away.team?.name || "Away",
                homeShort: home.team?.shortDisplayName || home.team?.abbreviation || home.team?.displayName,
                awayShort: away.team?.shortDisplayName || away.team?.abbreviation || away.team?.displayName,
                homeScore: home.score != null && home.score !== "" ? Number(home.score) : null,
                awayScore: away.score != null && away.score !== "" ? Number(away.score) : null,
                homeLogo: home.team?.logo || null,
                awayLogo: away.team?.logo || null,
                status,
                inning: sport === "baseball" ? detail : null,
                minute: sport === "soccer" ? detail : null,
                date: dateLabel,
                time: timeLabel,
                venue: comp.venue?.fullName || null,
                broadcast: broadcasts ? broadcasts.join(" / ") : null,
            };
        }

        function statValue(stats, ...names) {
            if (!Array.isArray(stats)) return null;
            for (const n of names) {
                const s = stats.find((x) => x.name === n || x.abbreviation === n || x.type === n);
                if (s) return s.value ?? s.displayValue ?? null;
            }
            return null;
        }

        function parseEntries(entries, sport) {
            return entries.map((e, idx) => {
                const stats = e.stats || [];
                const team = e.team?.displayName || e.team?.shortDisplayName || e.team?.name || "—";
                const logo = e.team?.logos?.[0]?.href || null;
                if (sport === "baseball") {
                    return { rank: idx + 1, team, logo, wins: statValue(stats, "wins") ?? 0, losses: statValue(stats, "losses") ?? 0, gamesBack: String(statValue(stats, "gamesBehind") ?? "—") };
                }
                return { rank: statValue(stats, "rank") ?? idx + 1, team, logo, played: statValue(stats, "gamesPlayed") ?? 0, wins: statValue(stats, "wins") ?? 0, draws: statValue(stats, "ties") ?? 0, losses: statValue(stats, "losses") ?? 0, gd: statValue(stats, "pointDifferential") ?? 0, points: statValue(stats, "points") ?? 0 };
            });
        }

        function parseStandings(data, sport) {
            const groups = [];
            const walk = (node, parentName = "") => {
                if (!node) return;
                if (node.standings?.entries?.length) {
                    groups.push({
                        name: parentName ? `${parentName} · ${node.name || node.abbreviation || ""}`.trim().replace(/·\s*$/, "") : node.name || node.abbreviation || "Standings",
                        teams: parseEntries(node.standings.entries, sport),
                    });
                }
                if (Array.isArray(node.children)) for (const c of node.children) walk(c, node.name || parentName);
            };
            walk(data);
            return groups;
        }

        function parseSummary(data, sport) {

            if (sport === "basketball" && Array.isArray(data.leaders)) {
                const extractTopScorers = (teamLeadersData) => {
                    const points = teamLeadersData?.find((l) => l.name === "points" || l.shortDisplayName === "PTS");
                    if (!points || !Array.isArray(points.leaders)) return null;
                    return points.leaders.slice(0, 3).map((p) => ({
                        name: p.athlete?.displayName || p.athlete?.shortName || "—",
                        value: p.displayValue || `${p.value || 0} PTS`,
                    }));
                };
                const home = data.leaders.find((l) => l.homeAway === "home");
                const away = data.leaders.find((l) => l.homeAway === "away");
                out.topScorers = {
                    home: extractTopScorers(home?.leaders) || [],
                    away: extractTopScorers(away?.leaders) || [],
                };
            }

            if (data.boxscore?.teams) {
                const homeT = data.boxscore.teams.find((t) => t.homeAway === "home") || data.boxscore.teams[1];
                const awayT = data.boxscore.teams.find((t) => t.homeAway === "away") || data.boxscore.teams[0];
                const toMap = (t) => {
                    const m = {};
                    (t?.statistics || []).forEach((s) => { m[s.name || s.label] = s.displayValue ?? s.value; });
                    return m;
                };
                out.teamStats = {
                    home: toMap(homeT), away: toMap(awayT),
                    homeName: homeT?.team?.displayName, awayName: awayT?.team?.displayName,
                };
            }

            if (data.rosters && Array.isArray(data.rosters) && data.rosters.length > 0) {
                const lineups = { home: [], away: [] };
                const formations = { home: null, away: null };

                data.rosters.forEach(r => {
                    const isHome = r.homeAway === "home";
                    const teamKey = isHome ? "home" : "away";
                    if (r.formation) formations[teamKey] = r.formation;

                    const roster = r.roster || [];
                    lineups[teamKey] = roster.filter(p => p.starter).map(p => {
                        const athlete = p.athlete || {};
                        return {
                            name: athlete.displayName || athlete.shortName || athlete.fullName || "—",
                            shortName: athlete.shortName || athlete.lastName || athlete.displayName?.split(" ").pop() || "—",
                            position: p.position?.abbreviation || athlete.position?.abbreviation || "",
                            number: p.jersey || "",
                            headshot: athlete.headshot?.href || null
                        };
                    });
                });

                if (lineups.home.length > 0 || lineups.away.length > 0) {
                    out.lineups = lineups;
                    out.formations = formations;
                }
            }

            // Highlights videos (ESPN may include them in summary)
            if (Array.isArray(data.videos) && data.videos.length > 0) {
                out.videos = data.videos.slice(0, 5).map((v) => ({
                    id: v.id,
                    headline: v.headline || v.title || "Highlights",
                    description: v.description || "",
                    thumbnail: v.thumbnail || v.images?.[0]?.url || null,
                    duration: v.duration || null,
                    url: v.links?.web?.href || v.links?.web?.short?.href || (v.id ? `https://www.espn.com/video/clip?id=${v.id}` : null),
                })).filter((v) => v.url);
            }

            out.venue = data.gameInfo?.venue?.fullName || data.header?.competitions?.[0]?.venue?.fullName || null;
            out.attendance = data.gameInfo?.attendance || null;
            return out;
        }

        function parseMlbSummary(data) {
            const liveData = data.liveData;
            const gameData = data.gameData;
            const homeName = gameData?.teams?.home?.name;
            const awayName = gameData?.teams?.away?.name;

            const allPlays = liveData?.plays?.allPlays || [];
            const scoringPlays = allPlays.filter(p => p.about?.isScoringPlay).map(p => {
                const isAway = p.about.halfInning === 'top';
                const teamName = isAway ? awayName : homeName;
                // result.event = "Home Run", "Single", "Double", "Walk", "Sac Fly", "Wild Pitch", etc.
                const eventType = p.result?.event || "";
                const desc = p.result?.description || "";
                // Find batter & responsible pitcher
                const batter = p.matchup?.batter?.fullName || null;
                const pitcher = p.matchup?.pitcher?.fullName || null;
                const isHomeRun = /home run/i.test(eventType);
                const isGrandSlam = /grand slam/i.test(desc);
                return {
                    when: `${isAway ? '表' : '裏'}${p.about.inning}回`,
                    inning: p.about.inning,
                    halfInning: p.about.halfInning,
                    team: teamName, homeAway: isAway ? "away" : "home",
                    text: desc,
                    score: p.result ? `${p.result.awayScore}-${p.result.homeScore}` : null,
                    eventType,
                    batter,
                    pitcher,
                    isHomeRun,
                    isGrandSlam,
                };
            });

            const homeBox = liveData?.boxscore?.teams?.home;
            const awayBox = liveData?.boxscore?.teams?.away;

            const toStats = (box) => {
                const b = box?.teamStats?.batting || {};
                const f = box?.teamStats?.fielding || {};
                return { hits: b.hits ?? 0, errors: f.errors ?? 0, homeRuns: b.homeRuns ?? 0, strikeOuts: b.strikeOuts ?? 0 };
            };

            const teamStats = homeBox && awayBox ? { home: toStats(homeBox), away: toStats(awayBox), homeName, awayName } : null;

            // Linescore (MLB official format: per-inning runs, hits, errors)
            const ls = liveData?.linescore;
            let linescore = null;
            if (ls && Array.isArray(ls.innings)) {
                const homeRuns = ls.innings.map((inn) => inn.home?.runs);
                const awayRuns = ls.innings.map((inn) => inn.away?.runs);
                linescore = {
                    home: homeRuns,
                    away: awayRuns,
                    homeTotal: ls.teams?.home?.runs ?? null,
                    awayTotal: ls.teams?.away?.runs ?? null,
                    homeHits: ls.teams?.home?.hits ?? null,
                    awayHits: ls.teams?.away?.hits ?? null,
                    homeErrors: ls.teams?.home?.errors ?? null,
                    awayErrors: ls.teams?.away?.errors ?? null,
                    currentInning: ls.currentInning,
                    inningHalf: ls.inningHalf, // "Top" or "Bottom"
                    isComplete: gameData?.status?.abstractGameState === "Final",
                };
            }

            const getLineup = (box) => {
                const order = box?.battingOrder || [];
                if (order.length === 0) return null;
                return order.map(id => {
                    const player = box.players[`ID${id}`];
                    return { name: player?.person?.fullName || 'Unknown', position: player?.position?.abbreviation || '', number: '' };
                });
            };
            const awayLineup = getLineup(awayBox);
            const homeLineup = getLineup(homeBox);
            const lineups = awayLineup && homeLineup ? { home: homeLineup, away: awayLineup } : null;

            return { scoringPlays, teamStats, lineups, formations: null, venue: gameData?.venue?.name || null, attendance: gameData?.gameInfo?.attendance || null, linescore };
        }

                else if (pos.includes('M') || pos === 'CM' || pos === 'CDM' || pos === 'CAM' || pos === 'RM' || pos === 'LM') groups.MF.push(p);

            if (groups.GK.length === 0 && lineup.length > 0) groups.GK.push(lineup[0]);

        function GameDetailModal({ game, league, sport, espnPath, isMlbOfficial, onClose }) {

                            setDetail(parseMlbSummary(raw));
                        } else {
                            raw = await fetchSummary(espnPath, game.id);
                            if (!mounted) return;
                            setDetail(parseSummary(raw, sport));
                        }
                    } catch (e) {
                        if (mounted) setError(e.message);
                    } finally {
                        if (mounted) setLoading(false);
                    }
                };
                load();
                return () => { mounted = false; };
            }, [espnPath, game.id, sport, isMlbOfficial]);

            const finished = game.status === "final" || game.status === "live";
            const detailLabel = sport === "baseball" ? game.inning : game.minute;
            const homeWin = finished && game.homeScore > game.awayScore;
            const awayWin = finished && game.awayScore > game.homeScore;

            return (
                <div className="modal-backdrop" onClick={onClose}>
                    <div className="modal-sheet" onClick={(e) => e.stopPropagation()}>
                        <div style={{ position: "sticky", top: 0, background: "rgba(10,10,10,0.95)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)", borderBottom: "1px solid #1f1f1f", padding: "14px 16px", zIndex: 5, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: league.accent, letterSpacing: 2 }}>GAME DETAIL</span>
                                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#666" }}>{game.date} · {game.time}</span>
                            </div>
                            <button onClick={onClose} style={{ background: "transparent", border: "1px solid #2a2a2a", color: "#aaa", padding: 6, display: "flex", alignItems: "center" }}><I.Close size={16} /></button>
                        </div>

                        <div style={{ padding: "20px 16px", borderBottom: "1px solid #1f1f1f", background: "linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%)" }}>
                            <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
                                <StatusPill status={game.status} accent={league.accent} detail={detailLabel} />
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 16, alignItems: "center" }}>
                                <div style={{ textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center" }}>
                                    <TeamLogo url={game.awayLogo} size={40} fallback={game.away} />
                                    <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: awayWin ? 900 : 700, fontSize: 18, color: awayWin ? "#fff" : "#aaa", lineHeight: 1.1, letterSpacing: 0.5, marginTop: 8 }}>{game.away}</div>
                                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 36, fontWeight: 700, color: awayWin ? league.accent : "#666", marginTop: 4, fontVariantNumeric: "tabular-nums" }}>{game.awayScore ?? "—"}</div>
                                </div>
                                <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 14, color: "#444", letterSpacing: 2 }}>VS</div>
                                <div style={{ textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center" }}>
                                    <TeamLogo url={game.homeLogo} size={40} fallback={game.home} />
                                    <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: homeWin ? 900 : 700, fontSize: 18, color: homeWin ? "#fff" : "#aaa", lineHeight: 1.1, letterSpacing: 0.5, marginTop: 8 }}>{game.home}</div>
                                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 36, fontWeight: 700, color: homeWin ? league.accent : "#666", marginTop: 4, fontVariantNumeric: "tabular-nums" }}>{game.homeScore ?? "—"}</div>
                                </div>
                            </div>
                        </div>

                        <div className="grain" style={{ padding: "20px 16px", minHeight: 200 }}>
                            {loading && (
                                <GameDetailSkeleton accent={league.accent} />
                            )}

                            {error && <div style={{ background: "#1a0f0f", border: "1px solid #3a1f1f", padding: 14, fontSize: 12, color: "#aaa" }}>詳細データを取得できませんでした: {error}</div>}

                            {detail && !loading && (
                                <>
                                    {/* Lineups / Rosters Block */}
                                    {detail.lineups && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                Starting Lineups
                                            </div>
                                            
                                            {sport === 'soccer' ? (
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
                                                    <div>
                                                        <div style={{ fontSize: 11, color: '#aaa', marginBottom: 6, fontWeight: 'bold', display: 'flex', justifyContent: 'space-between' }}>
                                                            <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><TeamLogo url={game.homeLogo} size={14} /> {game.homeShort} (HOME)</span>
                                                            {detail.formations?.home && <span style={{ color: league.accent, fontFamily: "'JetBrains Mono', monospace" }}>{detail.formations.home}</span>}
                                                        </div>
                                                        <PitchLineup lineup={detail.lineups.home} accent={league.accent} />
                                                    </div>
                                                    <div>
                                                        <div style={{ fontSize: 11, color: '#aaa', marginBottom: 6, fontWeight: 'bold', display: 'flex', justifyContent: 'space-between' }}>
                                                            <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><TeamLogo url={game.awayLogo} size={14} /> {game.awayShort} (AWAY)</span>
                                                            {detail.formations?.away && <span style={{ color: league.accent, fontFamily: "'JetBrains Mono', monospace" }}>{detail.formations.away}</span>}
                                                        </div>
                                                        <PitchLineup lineup={detail.lineups.away} accent={league.accent} />
                                                    </div>
                                                </div>
                                            ) : (
                                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                                                    <div>
                                                        <div style={{ fontSize: 11, color: '#aaa', marginBottom: 6, fontWeight: 'bold', display: 'flex', justifyContent: 'space-between' }}>
                                                            <span>{game.awayShort}</span>
                                                        </div>
                                                        <div style={{ background: "#141414", border: "1px solid #1f1f1f" }}>
                                                            {detail.lineups.away.map((p, i) => (
                                                                <div key={i} style={{ display: 'flex', alignItems: 'center', fontSize: 11, padding: '6px 8px', borderBottom: i < detail.lineups.away.length - 1 ? '1px solid #1f1f1f' : 'none' }}>
                                                                    <span style={{ color: '#666', fontFamily: "'JetBrains Mono', monospace", width: 14 }}>{i+1}</span>
                                                                    <span style={{ color: league.accent, fontFamily: "'JetBrains Mono', monospace", width: 20, fontSize: 9 }}>{p.position}</span>
                                                                    <span style={{ color: '#ddd', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <div style={{ fontSize: 11, color: '#aaa', marginBottom: 6, fontWeight: 'bold', display: 'flex', justifyContent: 'space-between' }}>
                                                            <span>{game.homeShort}</span>
                                                        </div>
                                                        <div style={{ background: "#141414", border: "1px solid #1f1f1f" }}>
                                                            {detail.lineups.home.map((p, i) => (
                                                                <div key={i} style={{ display: 'flex', alignItems: 'center', fontSize: 11, padding: '6px 8px', borderBottom: i < detail.lineups.home.length - 1 ? '1px solid #1f1f1f' : 'none' }}>
                                                                    <span style={{ color: '#666', fontFamily: "'JetBrains Mono', monospace", width: 14 }}>{i+1}</span>
                                                                    <span style={{ color: league.accent, fontFamily: "'JetBrains Mono', monospace", width: 20, fontSize: 9 }}>{p.position}</span>
                                                                    <span style={{ color: '#ddd', flex: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{p.name}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Basketball: Linescore (Q1-Q4 + OT) */}
                                    {sport === "basketball" && detail.linescore && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                ピリオド別スコア
                                            </div>
                                            <BasketballLinescore linescore={detail.linescore} accent={league.accent} game={game} />
                                        </div>
                                    )}

                                    {/* Basketball: Top scorers */}
                                    {sport === "basketball" && detail.topScorers && (detail.topScorers.home.length > 0 || detail.topScorers.away.length > 0) && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                得点トップ
                                            </div>
                                            <TopScorers topScorers={detail.topScorers} accent={league.accent} game={game} />
                                        </div>
                                    )}

                                    {/* Soccer-specific scoring display */}
                                    {sport === "soccer" && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                得点シーン
                                            </div>
                                            <SoccerGoalsList scoringPlays={detail.scoringPlays} accent={league.accent} game={game} />
                                        </div>
                                    )}

                                    {/* Baseball: Inning-by-inning linescore (1-9 + R H E) */}
                                    {sport === "baseball" && detail.linescore && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                イニング別スコア
                                            </div>
                                            <BaseballLinescore linescore={detail.linescore} accent={league.accent} game={game} />
                                        </div>
                                    )}

                                    {/* Baseball: Detailed scoring plays */}
                                    {sport === "baseball" && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                得点経過
                                            </div>
                                            <BaseballScoringList scoringPlays={detail.scoringPlays} accent={league.accent} game={game} />
                                        </div>
                                    )}

                                    {/* Other sports - generic scoring plays */}
                                    {sport !== "soccer" && sport !== "basketball" && sport !== "baseball" && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>
                                                得点シーン
                                            </div>
                                            {detail.scoringPlays.length === 0 ? (
                                                <div style={{ fontSize: 12, color: "#666", padding: 20, textAlign: "center", background: "#141414", border: "1px solid #1f1f1f" }}>
                                                    {game.status === "scheduled" ? "試合開始前です" : "得点データがありません"}
                                                </div>
                                            ) : (
                                                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                                                    {detail.scoringPlays.map((p, i) => (
                                                        <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr auto", gap: 10, padding: "10px 12px", background: "#141414", border: "1px solid #1f1f1f", borderLeft: `2px solid ${league.accent}`, alignItems: "start" }}>
                                                            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: league.accent, fontWeight: 700, paddingTop: 2 }}>{p.when}</div>
                                                            <div style={{ fontSize: 12, color: "#ddd", lineHeight: 1.5 }}>
                                                                <div style={{ color: "#ddd", fontSize: 12 }}>{p.text}</div>
                                                            </div>
                                                            {p.score && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#888", fontVariantNumeric: "tabular-nums", paddingTop: 2 }}>{p.score}</div>}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {/* Team stats */}
                                    {detail.teamStats && (
                                        <div style={{ marginBottom: 20 }}>
                                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, color: league.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Team Stats</div>
                                            <TeamStatsTable game={game} stats={detail.teamStats} />
                                        </div>
                                    )}

                                    {/* Footer info */}
                                    {(detail.venue || detail.attendance) && (
                                        <div style={{ fontSize: 10, color: "#666", fontFamily: "'JetBrains Mono', monospace", display: "flex", flexDirection: "column", gap: 4, paddingTop: 10, borderTop: "1px dashed #222" }}>
                                            {detail.venue && <div>Venue: {detail.venue}</div>}
                                            {detail.attendance && <div>Attendance: {Number(detail.attendance).toLocaleString()}</div>}
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function BaseballLinescore({ linescore, accent, game }) {
            if (!linescore || (!linescore.home?.length && !linescore.away?.length)) {
                return <div style={{ fontSize: 12, color: "#666", padding: 20, textAlign: "center" }}>{game.status === "scheduled" ? "試合開始前です" : "イニングデータがありません"}</div>;
            }
            const innings = Math.max(linescore.home.length, linescore.away.length, 9);
            const labels = [];
            for (let i = 0; i < innings; i++) labels.push(`${i + 1}`);
            // Columns: TEAM | 1 | 2 | ... | n | R | H | E
            const cols = `36px ${labels.map(() => "minmax(20px, 1fr)").join(" ")} 28px 28px 28px`;

            const renderCell = (val, half, inn) => {
                // Top half not yet played by home team in current inning
                if (val == null || val === undefined) {
                    if (half === "home" && linescore.currentInning === inn + 1 && linescore.inningHalf === "Top" && !linescore.isComplete) return "";
                    return "—";
                }
                return val;
            };

            return (
                <div style={{ background: "#141414", border: "1px solid #1f1f1f", overflow: "auto" }}>
                    <div style={{ display: "grid", gridTemplateColumns: cols, padding: "10px 8px", borderBottom: "1px solid #1f1f1f", fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#666", letterSpacing: 1, fontWeight: 700, minWidth: 360 }}>
                        <span></span>
                        {labels.map((l) => <span key={l} style={{ textAlign: "center" }}>{l}</span>)}
                        <span style={{ textAlign: "right", color: accent }}>R</span>
                        <span style={{ textAlign: "right", color: "#999" }}>H</span>
                        <span style={{ textAlign: "right", color: "#999" }}>E</span>
                    </div>
                    {[
                        { key: "away", name: game.awayShort || "AWAY", scores: linescore.away, total: linescore.awayTotal, hits: linescore.awayHits, errors: linescore.awayErrors },
                        { key: "home", name: game.homeShort || "HOME", scores: linescore.home, total: linescore.homeTotal, hits: linescore.homeHits, errors: linescore.homeErrors },
                    ].map((row, ri) => (
                        <div key={ri} style={{ display: "grid", gridTemplateColumns: cols, padding: "12px 8px", alignItems: "center", borderBottom: ri === 0 ? "1px solid #1a1a1a" : "none", minWidth: 360 }}>
                            <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 13, fontWeight: 800, color: "#fff", letterSpacing: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.name}</span>
                            {labels.map((_, i) => {
                                const v = row.scores?.[i];
                                const isCurrent = linescore.currentInning === i + 1 && !linescore.isComplete;
                                return (
                                    <span key={i} style={{ textAlign: "center", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: isCurrent ? accent : "#ddd", fontWeight: isCurrent ? 800 : 600, fontVariantNumeric: "tabular-nums" }}>
                                        {renderCell(v, row.key, i)}
                                    </span>
                                );
                            })}
                            <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontSize: 15, color: accent, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{row.total ?? "—"}</span>
                            <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#aaa", fontVariantNumeric: "tabular-nums" }}>{row.hits ?? "—"}</span>
                            <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#aaa", fontVariantNumeric: "tabular-nums" }}>{row.errors ?? "—"}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function translateMlbEvent(eventType, isHomeRun, isGrandSlam) {
            if (isGrandSlam) return { jp: "満塁本塁打", emoji: "💥", highlight: true };
            if (isHomeRun) return { jp: "本塁打", emoji: "⚾", highlight: true };
            const map = {
                "Single": { jp: "単打", emoji: "" },
                "Double": { jp: "二塁打", emoji: "" },
                "Triple": { jp: "三塁打", emoji: "" },
                "Walk": { jp: "四球", emoji: "" },
                "Hit By Pitch": { jp: "死球", emoji: "" },
                "Sac Fly": { jp: "犠飛", emoji: "" },
                "Sac Bunt": { jp: "犠打", emoji: "" },
                "Wild Pitch": { jp: "暴投", emoji: "" },
                "Passed Ball": { jp: "捕逸", emoji: "" },
                "Field Error": { jp: "失策", emoji: "" },
                "Forceout": { jp: "封殺", emoji: "" },
                "Grounded Into DP": { jp: "併殺", emoji: "" },
                "Strikeout": { jp: "三振", emoji: "" },
                "Groundout": { jp: "ゴロアウト", emoji: "" },
                "Flyout": { jp: "フライアウト", emoji: "" },
            };
            return map[eventType] || { jp: eventType || "—", emoji: "" };
        }

        function BaseballScoringList({ scoringPlays, accent, game }) {
            if (!scoringPlays || scoringPlays.length === 0) {
                return <div style={{ fontSize: 12, color: "#666", padding: 20, textAlign: "center" }}>{game.status === "scheduled" ? "試合開始前です" : "得点データがありません"}</div>;
            }
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {scoringPlays.map((p, i) => {
                        const tr = translateMlbEvent(p.eventType, p.isHomeRun, p.isGrandSlam);
                        const isAway = p.homeAway === "away";
                        return (
                            <div key={i} style={{ background: tr.highlight ? "linear-gradient(90deg, rgba(255,77,46,0.08) 0%, transparent 60%)" : "#141414", border: tr.highlight ? `1px solid ${accent}` : "1px solid #1f1f1f", borderLeft: `3px solid ${tr.highlight ? accent : "#444"}`, padding: "12px 14px" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 6, flexWrap: "wrap" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: accent, fontWeight: 800, letterSpacing: 0.5 }}>
                                            {p.when}
                                        </span>
                                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#666", letterSpacing: 0.5, padding: "2px 6px", border: "1px solid #2a2a2a" }}>
                                            {isAway ? game.awayShort : game.homeShort}
                                        </span>
                                        {tr.jp && (
                                            <span style={{ fontFamily: "'Manrope', sans-serif", fontSize: 11, color: tr.highlight ? accent : "#aaa", fontWeight: 700 }}>
                                                {tr.emoji} {tr.jp}
                                            </span>
                                        )}
                                    </div>
                                    {p.score && (
                                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#888", fontVariantNumeric: "tabular-nums", fontWeight: 700 }}>
                                            {p.score}
                                        </span>
                                    )}
                                </div>
                                {p.batter && (
                                    <div style={{ fontWeight: 700, color: "#fff", fontSize: 14, marginBottom: 4 }}>
                                        {tr.highlight ? "🦸 " : "🏏 "}{p.batter}
                                        {p.pitcher && <span style={{ fontSize: 10, color: "#666", fontWeight: 400, marginLeft: 8 }}>vs {p.pitcher}</span>}
                                    </div>
                                )}
                                <div style={{ fontSize: 11, color: "#888", lineHeight: 1.5 }}>{p.text}</div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function SoccerGoalsList({ scoringPlays, accent, game }) {
            if (!scoringPlays || scoringPlays.length === 0) {
                return <div style={{ fontSize: 12, color: "#666", padding: 20, textAlign: "center" }}>{game.status === "scheduled" ? "試合開始前です" : "得点データがありません"}</div>;
            }
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {scoringPlays.map((p, i) => {
                        const isHome = p.homeAway === "home";
                        return (
                            <div key={i} style={{ background: "#141414", border: "1px solid #1f1f1f", borderLeft: `3px solid ${accent}`, padding: "12px 14px", display: "grid", gridTemplateColumns: isHome ? "1fr auto 60px" : "60px auto 1fr", gap: 10, alignItems: "center" }}>
                                {!isHome && (
                                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: accent, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{p.when || "—"}</div>
                                )}
                                <div style={{ minWidth: 0, textAlign: isHome ? "right" : "left" }}>
                                    {p.scorer ? (
                                        <>
                                            <div style={{ fontWeight: 700, color: "#fff", fontSize: 14, lineHeight: 1.2, display: "flex", alignItems: "center", justifyContent: isHome ? "flex-end" : "flex-start", gap: 6 }}>
                                                {!isHome && <span style={{ fontSize: 16 }}>⚽</span>}
                                                <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.scorer}</span>
                                                {p.scoringType && <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 800, padding: "1px 5px", background: p.scoringType === "OG" ? "#aa3333" : "#666", color: "#fff", letterSpacing: 0.5 }}>{p.scoringType}</span>}
                                                {isHome && <span style={{ fontSize: 16 }}>⚽</span>}
                                            </div>
                                            {p.assist && (
                                                <div style={{ fontSize: 10, color: "#888", marginTop: 3, fontStyle: "italic" }}>
                                                    Assist: {p.assist}
                                                </div>
                                            )}
                                        </>
                                    ) : (
                                        <div style={{ fontSize: 12, color: "#aaa" }}>{p.text}</div>
                                    )}
                                    {p.score && <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#666", marginTop: 4, fontVariantNumeric: "tabular-nums" }}>{p.score}</div>}
                                </div>
                                <div style={{ fontSize: 10, color: "#666", fontFamily: "'JetBrains Mono', monospace", textAlign: isHome ? "right" : "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                    {isHome ? game.homeShort : game.awayShort}
                                </div>
                                {isHome && (
                                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: accent, fontWeight: 800, fontVariantNumeric: "tabular-nums", textAlign: "right" }}>{p.when || "—"}</div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        function BasketballLinescore({ linescore, accent, game }) {
            if (!linescore || (!linescore.home?.length && !linescore.away?.length)) {
                return <div style={{ fontSize: 12, color: "#666", padding: 20, textAlign: "center" }}>{game.status === "scheduled" ? "試合開始前です" : "ピリオドデータがありません"}</div>;
            }
            const periods = Math.max(linescore.home.length, linescore.away.length);
            const labels = [];
            for (let i = 0; i < periods; i++) {
                if (i < 4) labels.push(`Q${i + 1}`);
                else labels.push(`OT${i - 3}`);
            }
            const cols = `60px ${labels.map(() => "1fr").join(" ")} 50px`;
            return (
                <div style={{ background: "#141414", border: "1px solid #1f1f1f", overflow: "hidden" }}>
                    <div style={{ display: "grid", gridTemplateColumns: cols, padding: "10px 12px", borderBottom: "1px solid #1f1f1f", fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#666", letterSpacing: 1, fontWeight: 700 }}>
                        <span>TEAM</span>
                        {labels.map((l) => <span key={l} style={{ textAlign: "center" }}>{l}</span>)}
                        <span style={{ textAlign: "right", color: accent }}>TOT</span>
                    </div>
                    {[
                        { name: game.awayShort || "AWAY", scores: linescore.away, total: linescore.awayTotal, full: game.away },
                        { name: game.homeShort || "HOME", scores: linescore.home, total: linescore.homeTotal, full: game.home },
                    ].map((row, ri) => (
                        <div key={ri} style={{ display: "grid", gridTemplateColumns: cols, padding: "12px", alignItems: "center", borderBottom: ri === 0 ? "1px solid #1a1a1a" : "none" }}>
                            <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 14, fontWeight: 800, color: "#fff", letterSpacing: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{row.name}</span>
                            {labels.map((_, i) => (
                                <span key={i} style={{ textAlign: "center", fontFamily: "'JetBrains Mono', monospace", fontSize: 14, color: "#ddd", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
                                    {row.scores?.[i] ?? "—"}
                                </span>
                            ))}
                            <span style={{ textAlign: "right", fontFamily: "'JetBrains Mono', monospace", fontSize: 16, color: accent, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>
                                {row.total ?? "—"}
                            </span>
                        </div>
                    ))}
                </div>
            );
        }

        function TopScorers({ topScorers, accent, game }) {
            if (!topScorers || (!topScorers.home?.length && !topScorers.away?.length)) return null;
            return (
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {[
                        { name: game.awayShort, players: topScorers.away },
                        { name: game.homeShort, players: topScorers.home },
                    ].map((side, si) => (
                        <div key={si} style={{ background: "#141414", border: "1px solid #1f1f1f" }}>
                            <div style={{ padding: "8px 10px", borderBottom: "1px solid #1f1f1f", fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: accent, letterSpacing: 1, fontWeight: 700 }}>{side.name}</div>
                            {(side.players || []).length === 0 ? (
                                <div style={{ padding: 10, fontSize: 10, color: "#555" }}>—</div>
                            ) : side.players.map((p, i) => (
                                <div key={i} style={{ padding: "8px 10px", borderBottom: i < side.players.length - 1 ? "1px solid #1a1a1a" : "none" }}>
                                    <div style={{ fontSize: 11, color: "#eee", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</div>
                                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: accent, marginTop: 2 }}>{p.value}</div>
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }

        function TeamStatsTable({ game, stats }) {
            const labels = {
                hits: "HITS", errors: "ERRORS", homeRuns: "HR", strikeOuts: "SO",
                possessionPct: "POSS %", shotsOnTarget: "SHOTS ON TGT", fouls: "FOULS", yellowCards: "YELLOW", redCards: "RED", saves: "SAVES",
            };
            const keys = Object.keys(labels).filter((k) => stats.home[k] !== undefined || stats.away[k] !== undefined);
            if (keys.length === 0) return <div style={{ fontSize: 12, color: "#666", padding: 16, textAlign: "center" }}>スタッツデータなし</div>;

            return (
                <div style={{ background: "#141414", border: "1px solid #1f1f1f" }}>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", padding: "8px 12px", borderBottom: "1px solid #1f1f1f", fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#666", letterSpacing: 1 }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><TeamLogo url={game.awayLogo} size={12} /> {game.awayShort || "AWAY"}</span>
                        <span style={{ textAlign: "center" }}>STAT</span>
                        <span style={{ textAlign: "right", display: 'flex', alignItems: 'center', justifyContent: 'flex-end', gap: 6 }}>{game.homeShort || "HOME"} <TeamLogo url={game.homeLogo} size={12} /></span>
                    </div>
                    {keys.map((k, i) => (
                        <div key={k} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", padding: "10px 12px", borderBottom: i < keys.length - 1 ? "1px solid #1a1a1a" : "none", alignItems: "center", gap: 8 }}>
                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#ddd", fontVariantNumeric: "tabular-nums" }}>{stats.away[k] ?? "—"}</span>
                            <span style={{ textAlign: "center", fontSize: 11, color: "#888" }}>{labels[k]}</span>
                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#ddd", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>{stats.home[k] ?? "—"}</span>
                        </div>
                    ))}
                </div>
            );
        }

        function LoadingSkeleton({ view, accent, count = 4 }) {
            if (view === "scores" || view === "schedule") {
                return (
                    <div>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 16, color: accent }}>
                            <span className="loading-dots"><span style={{ background: accent }}></span><span style={{ background: accent }}></span><span style={{ background: accent }}></span></span>
                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, color: "#888" }}>LOADING {view.toUpperCase()}</span>
                        </div>
                        {Array.from({ length: count }).map((_, i) => (
                            <div key={i} className="skeleton-card" style={{ borderLeftColor: accent, opacity: 1 - i * 0.15 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                                    <div className="skeleton" style={{ width: 80, height: 10 }} />
                                    <div className="skeleton" style={{ width: 50, height: 14 }} />
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                        <div className="skeleton" style={{ width: "60%", height: 18 }} />
                                        <div className="skeleton" style={{ width: 30, height: 22 }} />
                                    </div>
                                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                        <div className="skeleton" style={{ width: "55%", height: 18 }} />
                                        <div className="skeleton" style={{ width: 30, height: 22 }} />
                                    </div>
                                </div>
                                <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px dashed #222" }}>
                                    <div className="skeleton" style={{ width: 100, height: 14 }} />
                                </div>
                            </div>
                        ))}
                    </div>
                );
            }
            if (view === "standings") {
                return (
                    <div>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 16, color: accent }}>
                            <span className="loading-dots"><span style={{ background: accent }}></span><span style={{ background: accent }}></span><span style={{ background: accent }}></span></span>
                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, color: "#888" }}>LOADING STANDINGS</span>
                        </div>
                        <div className="skeleton" style={{ height: 14, width: 120, marginBottom: 8 }} />
                        <div style={{ background: "#141414", border: "1px solid #1f1f1f" }}>
                            {Array.from({ length: 8 }).map((_, i) => (
                                <div key={i} style={{ display: "grid", gridTemplateColumns: "28px 1fr 60px", gap: 8, padding: "12px", borderBottom: i < 7 ? "1px solid #1a1a1a" : "none", alignItems: "center" }}>
                                    <div className="skeleton" style={{ height: 12, width: 16 }} />
                                    <div className="skeleton" style={{ height: 14, width: `${50 + (i * 7) % 40}%` }} />
                                    <div className="skeleton" style={{ height: 12, width: 50 }} />
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
            // leaders
            return (
                <div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 16, color: accent }}>
                        <span className="loading-dots"><span style={{ background: accent }}></span><span style={{ background: accent }}></span><span style={{ background: accent }}></span></span>
                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, color: "#888" }}>LOADING LEADERS</span>
                    </div>
                    {Array.from({ length: 3 }).map((_, ci) => (
                        <div key={ci} style={{ background: "#141414", border: "1px solid #1f1f1f", marginBottom: 16 }}>
                            <div style={{ padding: "10px 14px", borderBottom: "1px solid #1f1f1f" }}>
                                <div className="skeleton" style={{ height: 16, width: 140 }} />
                            </div>
                            {Array.from({ length: 5 }).map((_, i) => (
                                <div key={i} style={{ display: "grid", gridTemplateColumns: "20px 1fr 60px", gap: 10, padding: "10px 14px", borderBottom: i < 4 ? "1px solid #1a1a1a" : "none", alignItems: "center" }}>
                                    <div className="skeleton" style={{ height: 12, width: 14 }} />
                                    <div className="skeleton" style={{ height: 13, width: `${50 + i * 8}%` }} />
                                    <div className="skeleton" style={{ height: 14, width: 40 }} />
                                </div>
                            ))}
                        </div>
                    ))}
                </div>
            );
        }

        function GameDetailSkeleton({ accent }) {
            return (
                <div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginBottom: 20, color: accent }}>
                        <span className="loading-dots"><span style={{ background: accent }}></span><span style={{ background: accent }}></span><span style={{ background: accent }}></span></span>
                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: 2, color: "#888" }}>LOADING DETAIL</span>
                    </div>
                    <div className="skeleton" style={{ height: 14, width: 120, marginBottom: 10 }} />
                    {Array.from({ length: 3 }).map((_, i) => (
                        <div key={i} style={{ display: "grid", gridTemplateColumns: "60px 1fr auto", gap: 10, padding: "12px", background: "#141414", border: "1px solid #1f1f1f", borderLeft: `2px solid ${accent}`, marginBottom: 6 }}>
                            <div className="skeleton" style={{ height: 12, width: 50 }} />
                            <div>
                                <div className="skeleton" style={{ height: 14, width: "70%", marginBottom: 6 }} />
                                <div className="skeleton" style={{ height: 11, width: "50%" }} />
                            </div>
                            <div className="skeleton" style={{ height: 12, width: 30 }} />
                        </div>
                    ))}
                </div>
            );
        }

        function WorldCupHighlights({ tournament, accent }) {
            const matches = tournament.featuredMatches || [];
            if (matches.length === 0) return null;

            const now = new Date();
            const startDate = new Date(tournament.tournamentStart);
            const endDate = new Date(tournament.tournamentEnd);
            const daysUntil = Math.ceil((startDate - now) / (1000 * 60 * 60 * 24));
            const isOngoing = now >= startDate && now <= endDate;
            const isPast = now > endDate;

            const formatJst = (iso) => {
                const d = new Date(iso);
                const days = ["日","月","火","水","木","金","土"];
                return {
                    date: `${pad(d.getMonth()+1)}/${pad(d.getDate())}`,
                    day: days[d.getDay()],
                    time: `${pad(d.getHours())}:${pad(d.getMinutes())}`,
                };
            };

            const tagColors = { OPENING: "#FFD93D", JAPAN: "#E5253E", FINAL: "#FFD93D" };
            const tagLabels = { OPENING: "🏆 開幕戦", JAPAN: "🇯🇵 日本代表", FINAL: "🏆 決勝" };

            const japanMatches = matches.filter((m) => m.tag === "JAPAN");
            const otherMatches = matches.filter((m) => m.tag !== "JAPAN");

            return (
                <div style={{ marginBottom: 20 }}>
                    {/* Tournament hero card */}
                    <div style={{ background: "linear-gradient(135deg, rgba(255,217,61,0.15) 0%, rgba(229,37,62,0.1) 100%)", border: `1px solid ${accent}`, padding: "20px 18px", marginBottom: 16, position: "relative", overflow: "hidden" }}>
                        <div style={{ position: "absolute", top: -10, right: -10, fontSize: 80, opacity: 0.08 }}>🏆</div>
                        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: accent, letterSpacing: 2, marginBottom: 6, fontWeight: 700 }}>FIFA WORLD CUP 2026</div>
                        <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 900, fontSize: 26, color: "#fff", letterSpacing: 1, lineHeight: 1, marginBottom: 12 }}>
                            🇺🇸 🇨🇦 🇲🇽 NORTH AMERICA
                        </div>
                        {!isPast && (
                            <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 8 }}>
                                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#aaa" }}>{isOngoing ? "開催中" : "開幕まで"}</span>
                                {!isOngoing && (
                                    <>
                                        <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 900, fontSize: 32, color: accent, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{daysUntil}</span>
                                        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#aaa" }}>日</span>
                                    </>
                                )}
                                {isOngoing && <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 900, fontSize: 22, color: accent }}>LIVE TOURNAMENT</span>}
                            </div>
                        )}
                        <div style={{ fontSize: 11, color: "#888", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.5 }}>
                            2026.06.11 — 07.19 · 48 TEAMS · 104 MATCHES
                        </div>
                    </div>

                    {/* Japan matches */}
                    {japanMatches.length > 0 && (
                        <div style={{ marginBottom: 16 }}>
                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, letterSpacing: 2, color: "#E5253E", marginBottom: 8, textTransform: "uppercase", display: "flex", alignItems: "center", gap: 8 }}>
                                🇯🇵 日本代表 · GROUP F
                            </div>
                            {japanMatches.map((m, i) => {
                                const t = formatJst(m.date);
                                const isPastMatch = new Date(m.date) < now;
                                return (
                                    <div key={i} style={{ background: "#141414", border: "1px solid rgba(229,37,62,0.4)", borderLeft: "3px solid #E5253E", padding: "12px 14px", marginBottom: 6, opacity: isPastMatch ? 0.55 : 1 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginBottom: 8 }}>
                                            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "#E5253E", fontWeight: 700, letterSpacing: 0.5 }}>
                                                MATCH {i + 1} · {t.date} ({t.day}) {t.time}
                                            </div>
                                            {isPastMatch && <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 9, color: "#666", letterSpacing: 1 }}>FINISHED</span>}
                                        </div>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                                            <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 18, fontWeight: m.away === "Japan" ? 900 : 700, color: m.away === "Japan" ? "#fff" : "#aaa", letterSpacing: 0.5 }}>{m.away}</span>
                                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#555" }}>vs</span>
                                            <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 18, fontWeight: m.home === "Japan" ? 900 : 700, color: m.home === "Japan" ? "#fff" : "#aaa", letterSpacing: 0.5 }}>{m.home}</span>
                                        </div>
                                        <div style={{ marginTop: 8, fontSize: 10, color: "#666", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.3 }}>📍 {m.venue}</div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* Other featured matches */}
                    {otherMatches.length > 0 && (
                        <div style={{ marginBottom: 16 }}>
                            <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, letterSpacing: 2, color: accent, marginBottom: 8, textTransform: "uppercase" }}>
                                🏆 注目試合
                            </div>
                            {otherMatches.map((m, i) => {
                                const t = formatJst(m.date);
                                const isPastMatch = new Date(m.date) < now;
                                const tagColor = tagColors[m.tag] || accent;
                                return (
                                    <div key={i} style={{ background: "#141414", border: "1px solid #1f1f1f", borderLeft: `3px solid ${tagColor}`, padding: "12px 14px", marginBottom: 6, opacity: isPastMatch ? 0.55 : 1 }}>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, marginBottom: 8 }}>
                                            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                                                <span style={{ background: tagColor, color: "#0a0a0a", padding: "2px 8px", fontFamily: "'JetBrains Mono', monospace", fontSize: 9, fontWeight: 800, letterSpacing: 1 }}>{tagLabels[m.tag]}</span>
                                                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "#aaa" }}>{t.date} ({t.day}) {t.time}</span>
                                            </div>
                                        </div>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                                            <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 18, fontWeight: 700, color: "#ddd", letterSpacing: 0.5 }}>{m.away}</span>
                                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: "#555" }}>vs</span>
                                            <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontSize: 18, fontWeight: 700, color: "#ddd", letterSpacing: 0.5 }}>{m.home}</span>
                                        </div>
                                        <div style={{ marginTop: 8, fontSize: 10, color: "#666", fontFamily: "'JetBrains Mono', monospace", letterSpacing: 0.3 }}>📍 {m.venue}</div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* All groups (collapsible) */}
                    <WorldCupGroups groups={WC2026_GROUPS} accent={accent} />

                    <div style={{ padding: 12, background: "rgba(255,255,255,0.02)", border: "1px dashed #2a2a2a", fontSize: 10, color: "#666", lineHeight: 1.6, fontFamily: "'JetBrains Mono', monospace" }}>
                        ※ 時刻はすべて日本時間 (JST)<br />
                        ※ 開幕後はESPN APIから全104試合のデータが自動取得されます
                    </div>
                </div>
            );
        }

        function WorldCupGroups({ groups, accent }) {
            const [expandedId, setExpandedId] = useState("F"); // Default: Japan's group expanded
            const days = ["日","月","火","水","木","金","土"];
            const fmtDate = (iso) => {
                const d = new Date(iso);
                return `${pad(d.getMonth()+1)}/${pad(d.getDate())} (${days[d.getDay()]}) ${pad(d.getHours())}:${pad(d.getMinutes())}`;
            };
            const now = new Date();

            return (
                <div style={{ marginBottom: 16 }}>
                    <div style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 800, fontSize: 14, letterSpacing: 2, color: accent, marginBottom: 8, textTransform: "uppercase" }}>
                        📊 全グループ日程
                    </div>
                    {groups.map((g) => {
                        const isExpanded = expandedId === g.id;
                        const hasJapan = g.teams.includes("Japan");
                        return (
                            <div key={g.id} style={{ marginBottom: 4 }}>
                                <button
                                    onClick={() => setExpandedId(isExpanded ? null : g.id)}
                                    className="clickable"
                                    style={{ width: "100%", background: isExpanded ? "#1a1a1a" : "#141414", border: "1px solid #1f1f1f", borderLeft: hasJapan ? "3px solid #E5253E" : `3px solid ${isExpanded ? accent : "#333"}`, padding: "10px 14px", textAlign: "left", color: "inherit", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, cursor: "pointer" }}
                                >
                                    <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0, flex: 1 }}>
                                        <span style={{ fontFamily: "'Big Shoulders Display', sans-serif", fontWeight: 900, fontSize: 18, color: hasJapan ? "#E5253E" : (isExpanded ? accent : "#aaa"), letterSpacing: 1, minWidth: 22 }}>
                                            {g.id}
                                        </span>
                                        <div style={{ fontSize: 11, color: "#888", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontFamily: "'Manrope', sans-serif" }}>
                                            {g.teams.map((t) => t === "Japan" ? "🇯🇵 Japan" : t).join(" · ")}
                                        </div>
                                    </div>
                                    <span style={{ color: isExpanded ? accent : "#555", fontSize: 12, fontFamily: "'JetBrains Mono', monospace", flexShrink: 0 }}>
                                        {isExpanded ? "▼" : "▶"}
                                    </span>
                                </button>
                                {isExpanded && (
                                    <div style={{ background: "#0d0d0d", border: "1px solid #1f1f1f", borderTop: "none", padding: "8px 12px" }}>
                                        {g.matches
                                            .slice()
